databases:
  - name: smartcommerce-db
    databaseName: smartcommerce
    user: smartcommerce
    plan: free

services:
  - type: web
    name: user-service
    runtime: docker
    dockerfilePath: ./services/user-service/Dockerfile
    dockerContext: ./services/user-service
    plan: free
    envVars:
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: smartcommerce-db
          property: connectionString

  - type: web
    name: product-service
    runtime: docker
    dockerfilePath: ./services/product-service/Dockerfile
    dockerContext: ./services/product-service
    plan: free
    envVars:
      - key: PORT
        value: 3002
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: smartcommerce-db
          property: connectionString

  - type: web
    name: order-service
    runtime: docker
    dockerfilePath: ./services/order-service/Dockerfile
    dockerContext: ./services/order-service
    plan: free
    envVars:
      - key: PORT
        value: 3003
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: smartcommerce-db
          property: connectionString

  - type: web
    name: recommendation-service
    runtime: docker
    dockerfilePath: ./services/recommendation-service/Dockerfile
    dockerContext: ./services/recommendation-service
    plan: free
    envVars:
      - key: PORT
        value: 3004
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: smartcommerce-db
          property: connectionString
      - key: PRODUCT_SERVICE_URL
        fromService:
          name: product-service
          type: web
          property: host

  - type: web
    name: smartcommerce-frontend
    runtime: docker
    dockerfilePath: ./frontend/web-app/Dockerfile
    dockerContext: ./frontend/web-app
    plan: free
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: user-service
          type: web
          property: host
